name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update to (leave empty to fetch latest from PyPI)'
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: version
        run: |
          set -e
          if [ -n "${{ github.event.client_payload.version }}" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(curl -sSf https://pypi.org/pypi/zpace/json | jq -r '.info.version')
          fi
          [ -n "$VERSION" ] || { echo "Failed to determine version"; exit 1; }
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"

          # Get zpace SHA256 from PyPI
          ZPACE_SHA256=$(curl -sSf https://pypi.org/pypi/zpace/${VERSION}/json | \
            jq -r '.urls[] | select(.packagetype == "sdist") | .digests.sha256')
          [ -n "$ZPACE_SHA256" ] || { echo "Failed to get zpace SHA256"; exit 1; }

          # Update zpace version in URL and its sha256
          sed -i "s|zpace-[0-9.]*\.tar\.gz|zpace-${VERSION}.tar.gz|" Formula/zpace.rb
          sed -i "s|sha256 \"[a-f0-9]*\"|sha256 \"${ZPACE_SHA256}\"|" Formula/zpace.rb

          echo "Updated zpace to ${VERSION}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zpace.rb
          git diff --cached --quiet || git commit -m "Update zpace to ${{ steps.version.outputs.version }} [automated: update-formula workflow]"
          git push
